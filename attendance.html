<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Bảng Công</title>
    <meta name="description" content="Phần mềm tính công và quản lý bảng chấm công công nhân theo tháng và năm" />

    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
    <!-- Luxury Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- ============================================================
     SIDEBAR
     ============================================================ -->
    <div id="sidebar">

        <!-- Brand -->
        <div class="sidebar-brand">
            <video src="img/logo_03tang.mp4" autoplay loop muted playsinline style="width:32px;height:32px;object-fit:contain;border-radius:8px;flex-shrink:0;
                       filter:drop-shadow(0 3px 8px rgba(245,158,11,.5))">
            </video>
            <span class="sidebar-brand-text">PHẦN MỀM<br>TÍNH CÔNG</span>
            <button id="btn-collapse-sidebar" title="Thu gọn">
                <i class="bi bi-layout-sidebar-reverse"></i>
            </button>
        </div>

        <!-- Nav -->
        <div class="px-1 mt-1">
            <div class="sidebar-section-label">Quản lý</div>

            <a href="workers.html" id="nav-workers" class="nav-link-tc" title="Công Nhân">
                <i class="bi bi-people-fill"></i>
                <span class="nav-label">Công Nhân</span>
            </a>
            <a href="attendance.html" id="nav-monthly" class="nav-link-tc active" title="Bảng Công Tháng">
                <i class="bi bi-calendar3"></i>
                <span class="nav-label">Bảng Công Tháng</span>
            </a>
            <a href="advances.html" id="nav-advances" class="nav-link-tc" title="Quản lý Ứng Tiền">
                <i class="bi bi-cash-stack"></i>
                <span class="nav-label">Ứng Tiền</span>
            </a>
            <a href="annual.html" id="nav-annual" class="nav-link-tc" title="Tổng Hợp Năm">
                <i class="bi bi-bar-chart-fill"></i>
                <span class="nav-label">Tổng Hợp Năm</span>
            </a>
            <a href="payment.html" id="nav-payment" class="nav-link-tc" title="Thanh Toán Lương">
                <i class="bi bi-wallet2"></i>
                <span class="nav-label">Thanh Toán</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="sidebar-footer">

            <button onclick="authLogout()" title="Đăng xuất" style="width:100%;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);
                       color:#fca5a5;border-radius:8px;padding:.45rem .5rem;
                       font-size:.78rem;font-weight:600;cursor:pointer;
                       display:flex;align-items:center;justify-content:center;gap:.4rem;
                       transition:background .2s">
                <i class="bi bi-box-arrow-left"></i>
                <span class="nav-label">Đăng xuất</span>
            </button>
        </div>
    </div>

    <!-- Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
    <div id="main-content">

        <!-- TOP BAR (mobile only) -->
        <div class="d-md-none tc-topbar d-flex align-items-center gap-2 px-3 py-2">
            <button id="btn-toggle-sidebar" class="btn btn-sm border-0 d-flex align-items-center p-1"
                style="background:rgba(255,255,255,.15);border-radius:8px">
                <i class="bi bi-list text-white fs-5"></i>
            </button>
            <i class="bi bi-calendar2-check-fill text-warning"></i>
            <span class="fw-bold text-white">Tính Công</span>
        </div>

        <!-- TOAST CONTAINER -->
        <div id="toast-container" class="tc-toast-box"></div>

        <!-- ==================================================
       SECTION 2: Bảng Công Tháng
       ================================================== -->
        <section id="sec-monthly">

            <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-4">
                <div data-aos="fade-right">
                    <h2 class="page-title"><i class="bi bi-calendar3"></i>Bảng Công Tháng</h2>
                    <p class="page-subtitle mb-0">Chấm công từng ngày cho công nhân</p>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="card border-0 shadow-sm mb-4" data-aos="fade-up">
                <div class="card-body py-2 px-4 d-flex align-items-center flex-wrap gap-3">
                    <div class="d-flex align-items-center gap-2">
                        <label class="fw-semibold small text-muted mb-0">Tháng</label>
                        <select id="att-month" class="form-select form-select-sm" style="width:auto">
                            <option value="1">Tháng 1</option>
                            <option value="2">Tháng 2</option>
                            <option value="3">Tháng 3</option>
                            <option value="4">Tháng 4</option>
                            <option value="5">Tháng 5</option>
                            <option value="6">Tháng 6</option>
                            <option value="7">Tháng 7</option>
                            <option value="8">Tháng 8</option>
                            <option value="9">Tháng 9</option>
                            <option value="10">Tháng 10</option>
                            <option value="11">Tháng 11</option>
                            <option value="12">Tháng 12</option>
                        </select>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label class="fw-semibold small text-muted mb-0">Năm</label>
                        <input id="att-year" type="number" class="form-control form-control-sm" style="width:90px"
                            min="2020" max="2099" />
                    </div>
                    <div class="d-flex align-items-center gap-2 ms-md-3">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white border-end-0 text-muted">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="att-search" class="form-control border-start-0 ps-0"
                                placeholder="Tìm tên/Mã công nhân..." style="width: 180px;">
                        </div>
                    </div>
                    <div class="d-flex gap-2 flex-wrap ms-auto align-items-center">
                        <span class="badge px-3 py-2"
                            style="background:rgba(18,183,106,.12);color:#065f46;font-size:.78rem;border-radius:20px">1
                            – Cả ngày</span>
                        <span class="badge px-3 py-2"
                            style="background:rgba(124,58,237,.1);color:#5b21b6;font-size:.78rem;border-radius:20px">0.5
                            – Nửa ngày</span>
                        <span class="badge px-3 py-2"
                            style="background:rgba(240,68,56,.1);color:#991b1b;font-size:.78rem;border-radius:20px">—
                            Nghỉ</span>
                        <span class="badge px-3 py-2"
                            style="background:#f1f5f9;color:#6b7280;font-size:.78rem;border-radius:20px">trống – Chưa
                            chấm</span>
                    </div>
                </div>
            </div>

            <!-- Attendance grid card -->
            <div class="card border-0 shadow-sm" data-aos="fade-up" data-aos-delay="60">
                <div
                    class="card-header bg-white d-flex align-items-center justify-content-between flex-wrap gap-2 py-2 px-4">
                    <span id="att-summary" class="fw-bold text-primary small">
                        <i class="bi bi-info-circle me-1"></i>
                    </span>
                    <div class="d-flex gap-2 flex-wrap">
                        <button id="att-btn-export-excel"
                            class="btn btn-sm btn-outline-success d-flex align-items-center gap-1 px-3">
                            <i class="bi bi-file-earmark-excel-fill"></i> Xuất Excel
                        </button>
                        <button id="att-btn-export-pdf"
                            class="btn btn-sm btn-outline-danger d-flex align-items-center gap-1 px-3">
                            <i class="bi bi-file-earmark-pdf-fill"></i> Xuất PDF
                        </button>
                        <button id="att-btn-clear"
                            class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1 px-3 ms-md-2">
                            <i class="bi bi-arrow-counterclockwise"></i> Xóa tháng
                        </button>
                        <button id="att-btn-save" class="btn btn-sm btn-primary d-flex align-items-center gap-1 px-3">
                            <i class="bi bi-floppy-fill"></i> Lưu bảng công
                        </button>
                    </div>
                </div>
                <div class="card-body p-3">
                    <div class="att-wrapper">
                        <table class="att-table">
                            <thead id="att-thead"></thead>
                            <tbody id="att-tbody"></tbody>
                        </table>
                    </div>
                    <p class="text-muted small mt-3 mb-0 text-center">
                        <i class="bi bi-hand-index-thumb me-1"></i>
                        Nhấn vào ô để chấm công. Nhấn nhiều lần: <strong>Cả ngày → Nửa ngày → Nghỉ → ...</strong>
                    </p>
                </div>
            </div>
        </section>

    </div><!-- /main-content -->


    <!-- ==================================================
     MODAL: Confirm Dialog
     ================================================== -->
    <div id="confirm-modal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center">
                <div class="modal-body py-4 px-4">
                    <div class="fs-1 mb-2" id="confirm-icon">⚠️</div>
                    <h6 class="fw-bold" id="confirm-title">Xác nhận</h6>
                    <p class="text-muted small mb-3" id="confirm-msg"></p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-sm btn-outline-secondary px-3" data-bs-dismiss="modal">Hủy</button>
                        <button id="confirm-ok" class="btn btn-sm btn-danger px-3">Xác nhận</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- AOS Animation -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <!-- Auth -->
    <script src="js/auth.js"></script>
    <script>authGuard();</script>
    <!-- App scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/workers.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/annual.js"></script>
    <script src="js/advances.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init({ duration: 420, once: true, easing: 'ease-out-cubic' });
    </script>

</body>

</html>
