<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Phần mềm Tính Công</title>
    <meta name="description" content="Đăng nhập vào hệ thống quản lý tính công lao động">

    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">

    <style>
        /* ── Base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0d1520;
        }

        /* ── Background: dot-grid + soft center glow ── */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(rgb(255 255 255 / 52%) 1px, #00000000 1px);
            background-size: 26px 26px;
            background-color: #0d1520;
            animation: gridBreathe 6s ease-in-out infinite alternate;
        }

        @keyframes gridBreathe {
            from {
                opacity: .55;
            }

            to {
                opacity: 1;
            }
        }

        /* Emerald center glow */
        .bg-scene::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 65% at 50% 50%,
                    rgba(5, 150, 105, .13) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Edge vignette */
        .bg-scene::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 100% 100% at 50% 50%,
                    transparent 35%, rgba(0, 0, 0, .5) 100%);
            pointer-events: none;
        }

        /* Mouse-tracking spotlight layer */
        #spotlight {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle 280px at 50% 50%,
                    rgba(5, 150, 105, .18) 0%,
                    transparent 70%);
            transition: background 0.08s linear;
            opacity: 0;
            animation: spotlightIn 1.2s .4s ease forwards;
        }

        @keyframes spotlightIn {
            to {
                opacity: 1;
            }
        }

        /* ── Wrapper ── */
        .login-root {
            position: relative;
            z-index: 1;
            width: min(100%, 440px);
            padding: 1.25rem;
        }

        /* ── iPhone-style Glass Card ── */
        .glass-card {
            background: linear-gradient(145deg,
                    rgba(255, 255, 255, .13) 0%,
                    rgba(255, 255, 255, .06) 50%,
                    rgba(255, 255, 255, .04) 100%);
            backdrop-filter: blur(32px) saturate(180%) brightness(1.08);
            -webkit-backdrop-filter: blur(32px) saturate(180%) brightness(1.08);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, .18);
            box-shadow:
                0 0 0 .5px rgba(255, 255, 255, .08) inset,
                0 32px 80px rgba(0, 0, 0, .55),
                0 8px 32px rgba(0, 0, 0, .3);
            padding: 2.6rem 2.4rem 2.2rem;
            animation: slideUp .65s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(36px) scale(.96);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Specular highlight strip at top */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .55), transparent);
            border-radius: 100%;
        }

        .glass-card {
            position: relative;
        }

        /* ── Brand logo ── */
        .brand-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            color: #fff;
            box-shadow:
                0 0 0 6px rgba(245, 158, 11, .14),
                0 12px 32px rgba(245, 158, 11, .4);
            animation: popIn .7s .1s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes popIn {
            from {
                transform: scale(.4) rotate(-20deg);
                opacity: 0;
            }

            to {
                transform: none;
                opacity: 1;
            }
        }

        /* ── Input fields ── */
        .glass-input-group .input-group-text {
            background: rgba(255, 255, 255, .07);
            border: 1.5px solid rgba(255, 255, 255, .14);
            border-right: none;
            color: rgba(255, 255, 255, .45);
            border-radius: 14px 0 0 14px !important;
            font-size: 1rem;
            transition: all .22s;
        }

        .glass-input-group .form-control {
            background: rgba(255, 255, 255, .07);
            border: 1.5px solid rgba(255, 255, 255, .14);
            border-left: none;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .9rem;
            font-weight: 500;
            border-radius: 0 14px 14px 0 !important;
            padding: .72rem 1rem;
            transition: all .22s;
        }

        .glass-input-group .form-control::placeholder {
            color: rgba(255, 255, 255, .28);
        }

        .glass-input-group:focus-within .form-control,
        .glass-input-group:focus-within .input-group-text {
            border-color: rgba(16, 185, 129, .7) !important;
            background: rgba(5, 150, 105, .1) !important;
            box-shadow: none !important;
        }

        .glass-input-group:focus-within .input-group-text {
            color: #10b981;
        }

        /* Eye toggle — sits inside the group */
        .glass-input-group .btn-eye {
            background: rgba(255, 255, 255, .07);
            border: 1.5px solid rgba(255, 255, 255, .14);
            border-left: none;
            color: rgba(255, 255, 255, .4);
            border-radius: 0 14px 14px 0 !important;
            padding: 0 .85rem;
            cursor: pointer;
            transition: color .18s;
        }

        .glass-input-group:focus-within .btn-eye {
            border-color: rgba(16, 185, 129, .7);
            background: rgba(5, 150, 105, .1);
        }

        .glass-input-group .btn-eye:hover {
            color: rgba(255, 255, 255, .8);
        }

        /* When eye button present, remove radius from input */
        .glass-input-group.has-eye .form-control {
            border-radius: 0 !important;
            border-right: none;
        }

        /* ── Labels ── */
        .field-label {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .5);
            margin-bottom: .4rem;
            display: block;
        }

        /* ── Error ── */
        .glass-error {
            display: none;
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 12px;
            color: #fca5a5;
            font-size: .82rem;
            font-weight: 600;
            padding: .65rem 1rem;
            margin-bottom: 1.1rem;
            align-items: center;
            gap: .5rem;
        }

        .glass-error.show {
            display: flex;
            animation: shakeX .4s ease;
        }

        @keyframes shakeX {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-7px);
            }

            75% {
                transform: translateX(7px);
            }
        }

        /* ── Login button ── */
        .btn-login {
            width: 100%;
            padding: .82rem 1rem;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: .02em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .22s, box-shadow .22s, opacity .22s;
            box-shadow: 0 6px 24px rgba(5, 150, 105, .45), 0 0 0 1px rgba(255, 255, 255, .1) inset;
        }

        /* Shimmer sweep */
        .btn-login::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .22), transparent);
            transform: skewX(-20deg);
            transition: left .6s;
        }

        .btn-login:hover::after {
            left: 140%;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(5, 150, 105, .55), 0 0 0 1px rgba(255, 255, 255, .1) inset;
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: .65;
            cursor: not-allowed;
        }

        /* ── Footer ── */
        .login-foot {
            text-align: center;
            margin-top: 1.4rem;
            font-size: .7rem;
            color: rgba(255, 255, 255, .2);
            letter-spacing: .04em;
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg-scene"></div>
    <!-- Mouse spotlight -->
    <div id="spotlight"></div>

    <div class="login-root">
        <div class="glass-card">

            <!-- Brand -->
            <div class="text-center mb-4">
                <video src="img/logo_03tang.mp4" autoplay loop muted playsinline class="mx-auto d-block mb-3" style="width:80px;height:80px;object-fit:contain;
                           border-radius:20px;
                           filter:drop-shadow(0 8px 24px rgba(245,158,11,.45))">
                </video>
                <h1 class="fw-800 mb-1" style="font-size:1.5rem;color:#fff;font-weight:800;letter-spacing:-.02em">
                    Phần Mềm Tính Công
                </h1>
                <p class="mb-0"
                    style="font-size:.73rem;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.1em;text-transform:uppercase">
                    Workplace Management System
                </p>
            </div>

            <!-- Error -->
            <div class="glass-error" id="loginError">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="loginErrorMsg">Tên đăng nhập hoặc mật khẩu không đúng.</span>
            </div>

            <!-- Form -->
            <form id="loginForm" novalidate autocomplete="off">

                <div class="mb-3">
                    <label class="field-label" for="loginUsername">Tên đăng nhập</label>
                    <div class="input-group glass-input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input id="loginUsername" type="text" class="form-control" placeholder="Nhập tên đăng nhập..."
                            autocomplete="username">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="field-label" for="loginPassword">Mật khẩu</label>
                    <div class="input-group glass-input-group has-eye">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input id="loginPassword" type="password" class="form-control" placeholder="Nhập mật khẩu..."
                            autocomplete="current-password">
                        <button type="button" class="btn-eye" id="btnTogglePwd">
                            <i class="bi bi-eye-fill" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span id="btnText"><i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập</span>
                    <span id="btnLoading" class="d-none">
                        <span class="spinner-border spinner-border-sm me-1" role="status"></span>Đang xử lý...
                    </span>
                </button>

            </form>

        </div>

        <p class="login-foot">&copy; 2026 Phần mềm được phát triển bởi Tăng De &nbsp;·&nbsp; v3.0</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth module -->
    <script src="js/auth.js"></script>

    <script>
        /* Redirect if already logged in */
        if (authGetSession()) window.location.href = 'workers.html';

        /* Toggle password */
        document.getElementById('btnTogglePwd').addEventListener('click', () => {
            const pwd = document.getElementById('loginPassword');
            const icon = document.getElementById('eyeIcon');
            const show = pwd.type === 'password';
            pwd.type = show ? 'text' : 'password';
            icon.className = show ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill';
        });

        /* Error helpers */
        function showError(msg) {
            const el = document.getElementById('loginError');
            document.getElementById('loginErrorMsg').textContent = msg;
            el.classList.remove('show');
            void el.offsetWidth; // retrigger animation
            el.classList.add('show');
        }
        function hideError() {
            document.getElementById('loginError').classList.remove('show');
        }

        ['loginUsername', 'loginPassword'].forEach(id =>
            document.getElementById(id).addEventListener('input', hideError)
        );

        /* Submit */
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username) return showError('Vui lòng nhập tên đăng nhập.');
            if (!password) return showError('Vui lòng nhập mật khẩu.');

            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            document.getElementById('btnText').classList.add('d-none');
            document.getElementById('btnLoading').classList.remove('d-none');

            await new Promise(r => setTimeout(r, 550));

            const session = authLogin(username, password);
            if (!session) {
                btn.disabled = false;
                document.getElementById('btnText').classList.remove('d-none');
                document.getElementById('btnLoading').classList.add('d-none');
                showError('Tên đăng nhập hoặc mật khẩu không đúng.');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
                return;
            }
            window.location.href = 'workers.html';
        });
        /* ── Mouse-tracking spotlight ── */
        (function () {
            const sp = document.getElementById('spotlight');
            let tx = window.innerWidth / 2, ty = window.innerHeight / 2;
            let cx = tx, cy = ty;

            document.addEventListener('mousemove', e => {
                tx = e.clientX;
                ty = e.clientY;
            });

            function tick() {
                // Smooth lerp
                cx += (tx - cx) * 0.07;
                cy += (ty - cy) * 0.07;
                sp.style.background = `radial-gradient(
                    circle 320px at ${cx}px ${cy}px,
                    rgba(5,150,105,.22) 0%,
                    rgba(5,150,105,.06) 40%,
                    transparent 70%)`;
                requestAnimationFrame(tick);
            }
            tick();
        })();

        /* ── Card tilt on mouse move ── */
        (function () {
            const card = document.querySelector('.glass-card');
            document.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = (e.clientX - cx) / (window.innerWidth / 2);
                const dy = (e.clientY - cy) / (window.innerHeight / 2);
                card.style.transform = `perspective(900px) rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg)`;
            });
            document.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';
            });
        })();
    </script>
</body>

</html>
